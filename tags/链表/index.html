span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br></pre></td><td class="code"><pre><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">给了单链表的头结点，</span></span><br><span class="line"><span class="string">给了一个int K 。</span></span><br><span class="line"><span class="string">要求把每 K 个结点逆转一下，</span></span><br><span class="line"><span class="string">要求返回的是逆转以后头结点的指针。</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">Node</span>():</span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">__init__</span>(<span class="params">self,data</span>):</span><br><span class="line">        self.data = data</span><br><span class="line">        self.<span class="built_in">next</span> = <span class="literal">None</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">linkedlist</span>():</span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">__init__</span>(<span class="params">self</span>):</span><br><span class="line">        self.front = <span class="literal">None</span></span><br><span class="line">        self.rear = <span class="literal">None</span></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">add</span>(<span class="params">self,item</span>):</span><br><span class="line">        node = Node(item)</span><br><span class="line">        <span class="keyword">if</span> self.front==<span class="literal">None</span> <span class="keyword">and</span> self.rear== <span class="literal">None</span>:</span><br><span class="line">            self.front = node</span><br><span class="line">            self.rear = node</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            self.rear.<span class="built_in">next</span> = node</span><br><span class="line">            self.rear = self.rear.<span class="built_in">next</span></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">show</span>(<span class="params">self</span>):</span><br><span class="line">        list_ = []</span><br><span class="line">        temp = self.front</span><br><span class="line">        <span class="keyword">while</span> temp:</span><br><span class="line">            list_.append(temp.data)</span><br><span class="line">            temp = temp.<span class="built_in">next</span></span><br><span class="line">        <span class="built_in">print</span>(list_)</span><br><span class="line">        <span class="keyword">return</span> list_</span><br><span class="line"></span><br><span class="line">ll = linkedlist()</span><br><span class="line">ll.add(<span class="string">&#x27;seat&#x27;</span>)</span><br><span class="line">ll.add(<span class="number">1</span>)</span><br><span class="line">ll.add(<span class="number">2</span>)</span><br><span class="line">ll.add(<span class="number">3</span>)</span><br><span class="line">ll.add(<span class="number">4</span>)</span><br><span class="line">ll.add(<span class="number">5</span>)</span><br><span class="line">ll.add(<span class="number">6</span>)</span><br><span class="line">ll.show()</span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">给了单链表的头结点，</span></span><br><span class="line"><span class="string">给了一个int K 。</span></span><br><span class="line"><span class="string">要求把每 K 个结点逆转一下，</span></span><br><span class="line"><span class="string">要求返回的是逆转以后头结点的指针。</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">需要三个指针，new指向逆转好的，old指向还没有逆转好的，temp指向old后面的结点以防丢失后面的数据。</span></span><br><span class="line"><span class="string">三个指针连续的后移。</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">reverse</span>(<span class="params">head,k</span>):</span><br><span class="line">    new = head.<span class="built_in">next</span></span><br><span class="line">    old = new.<span class="built_in">next</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(k-<span class="number">1</span>):</span><br><span class="line">        temp = old.<span class="built_in">next</span></span><br><span class="line">        old.<span class="built_in">next</span> = new <span class="comment"># 实现逆序操作。</span></span><br><span class="line">        new = old</span><br><span class="line">        old = temp</span><br><span class="line">    head.<span class="built_in">next</span>.<span class="built_in">next</span> = old       <span class="comment"># 保证链表的完整性。</span></span><br><span class="line">                          <span class="comment"># head的 next，这里可以体现出头部设置空结点的好处。</span></span><br><span class="line">                          <span class="comment"># 这里的空结点用seat在链表里设定了。就没有写进reverse方法里面了。</span></span><br><span class="line">    head.<span class="built_in">next</span> = new  <span class="comment">#</span></span><br><span class="line">    <span class="keyword">return</span> new</span><br><span class="line"></span><br><span class="line">result = reverse(ll.front,<span class="number">6</span>)</span><br><span class="line"><span class="built_in">print</span>(result.data)</span><br><span class="line">ll.show()</span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">注意：</span></span><br><span class="line"><span class="string">这里重点介绍一下设置头结点，在链表操作中的好处</span></span><br><span class="line"><span class="string">1、使头部的操作和中部尾部的操作一致；</span></span><br><span class="line"><span class="string">2、使非空链表与空链表的操作统一；</span></span><br><span class="line"><span class="string">3、在改变链表的顺序时，可以避免链表数据丢失。</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">就比如上面这题，如果有一个头结点，可以说相当于有一个锚。</span></span><br><span class="line"><span class="string">方便和后面的几个新加入的new、old等指针配合使用。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">纠正一个我之前的错误认知，插入结点时，并不是说一定要保证链表的连贯不断，</span></span><br><span class="line"><span class="string">而是要保证 断开的结点还能 在书写上能够找回来，</span></span><br><span class="line"><span class="string">插入结点时之所以是&quot;先插再断&quot;，是因为这样可以在书写上实现找到后序结点。</span></span><br><span class="line"><span class="string">本题中，逆序的过程中，出现过断链的情况，但是借助new 、old 指针，</span></span><br><span class="line"><span class="string">可以找回结点，所以也没关系。</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
