                </h1>
                <div class="postShorten-meta">

		    Sep 27, 2021
    	
    </time>
    
        <span>in </span>
        
    <a class="category-link" href="/categories/%E6%B5%99%E5%A4%A7%E7%AE%97%E6%B3%95%E4%B8%8E%E6%95%B0%E6%8D%AE%E7%BB%93%E6%9E%84%E8%AF%BE%E7%A8%8B-python%E5%AE%9E%E7%8E%B0/">浙大算法与数据结构课程(python实现)</a>

                <div class="postShorten-content">
                    <figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># coding:uft-8</span></span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">平均查找长度ASL：</span></span><br><span class="line"><span class="string">【 每一层的单个元素查找要多少次 * 这一层多少个元素 】所有层数求和/树的元素个数 = 平均查找长度</span></span><br><span class="line"><span class="string">可以很明显的看出来，平衡二叉树的平均查找长度要比普通搜索二叉树小一些。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">平衡因子BF：</span></span><br><span class="line"><span class="string">BF = Hl - Hr 。左右子树高度差。  None 的高度 为 -1 ，一个结点的高度为0，两个结点高度为1。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">平衡二叉树AV：</span></span><br><span class="line"><span class="string">对于每一个结点来说  \BF\ &lt;= 1 ,</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">完全二叉树的 h = log2（n）</span></span><br><span class="line"><span class="string">高度为h 的平衡二叉树最少结点数：</span></span><br><span class="line"><span class="string">n（h） = n（h-1）+n（h-2）+ 1</span></span><br><span class="line"><span class="string">类似斐波那契数列。 但是 n1 与 F1 值不相等，且没有后面的 +1 ，</span></span><br><span class="line"><span class="string">n（h） = F(h+2) - 1</span></span><br><span class="line"><span class="string">数学推理，h = O(log2（n))</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string"> 平衡树的调整：</span></span><br><span class="line"><span class="string"> 插入破坏平衡的结点，重新构造树的结构，使之重新平衡。</span></span><br><span class="line"><span class="string"> 右子树下的右子树 下面插入 叫 RR 插入。</span></span><br><span class="line"><span class="string"> RR 插入，需要 RR 旋转来重新平衡。</span></span><br><span class="line"><span class="string"> RR 旋转 要将被破坏的结点的右子树拎上来，再将其其它结点位移或者不位移，保证其为搜索二叉树。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"> LL 左左旋转同理，</span></span><br><span class="line"><span class="string"> 需要注意的是被破坏结点的位置别找错！</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"> 如果一个插入后，同时出现两个结点被破坏，还是一次旋转，就能让两个结点都重新平衡。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"> LR 插入 用LR旋转来 重新平衡。</span></span><br><span class="line"><span class="string"> LR 旋转，将被破坏结点的左儿子的右儿子结点，拎上来，再将其其它结点位移或者不位移，保证其为搜索二叉树。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"> RL 插入 和RL旋转 同理。</span></span><br><span class="line"><span class="string"> 需要注意的是被破坏结点的位置别找错！</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"> 注意：</span></span><br><span class="line"><span class="string"> 旋转的 调整总是 在被破坏的结点往下的R L 三个结点 调整相对位置，其它结点适当移动保证搜索二叉树就行。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"> 有时候插入之后，树的结构不需要边，但是平衡因子一定会变。</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br></pre></td></tr></table></figure>
