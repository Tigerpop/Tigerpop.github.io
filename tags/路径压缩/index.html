span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br></pre></td><td class="code"><pre><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">按秩归并 是对union方法的改进。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">路径压缩是对find方法改进。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 改进后的find 的目的还是从s中找出x的根结点。</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#     注意else中包括三步：</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#     1、找出父结点的根，</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#     2、将此结点指向这个 （父结点的根），</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#     3、返回此根。</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 作用：把树高给缩短了。儿子直接指向了爷爷，和父亲同辈了。</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#       只需要一次find，就可以把树的结构改变，缩短成2层的树。方便日后操作。</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">find</span>(<span class="params">x,s</span>):</span><br><span class="line">    <span class="keyword">if</span> s[x] &lt; <span class="number">0</span>:</span><br><span class="line">        <span class="keyword">return</span> x</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        s[x] = find(s[x], s) <span class="comment"># 在递归从&quot;基线条件反向出栈&quot;时，重构了树的结构。</span></span><br><span class="line">        <span class="keyword">return</span> s[x]     <span class="comment"># 这样的&quot;尾递归&quot;不会让系统内存爆掉。</span></span><br><span class="line">                        <span class="comment"># 因为&quot;尾递归&quot;容易转为循环。</span></span><br><span class="line">                        <span class="comment"># 编译器会把&quot;尾递归&quot;直接编译为循环来使用。</span></span><br><span class="line">                        <span class="comment"># 也就是说执行时，机器用的其实是循环。</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 在按秩归并的情况下，最坏的情况满二叉树，树高log n ，查询次数log n，</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 查n次就是nlog n，</span></span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">引理Targan </span></span><br><span class="line"><span class="string">令T(M,N)为交错执行 M&gt;=N 次带路径压缩的查找，和 N-1 次按秩归并的最坏情况时间。</span></span><br><span class="line"><span class="string">则 存在常数 k1 k2 使得：</span></span><br><span class="line"><span class="string">k1 * M * a(M,N) &lt;= T(M,N) &lt;= k2 * M * a(M,N)</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">a(M,N) = min&#123;i&gt;=1, A(i,\M/N\)&gt;log N &#125; &lt;= O(log* N) &lt;= 4</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">find</span>(<span class="params">x,s</span>):</span><br><span class="line">    <span class="keyword">if</span> s[x] &lt; <span class="number">0</span>:</span><br><span class="line">        <span class="keyword">return</span> x</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        s[x] = find(s[x], s) <span class="comment"># 在递归从&quot;基线条件反向出栈&quot;时，重构了树的结构。</span></span><br><span class="line">        <span class="keyword">return</span> s[x]</span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">union</span>(<span class="params">x,y,s</span>):</span><br><span class="line">    <span class="keyword">if</span> <span class="built_in">abs</span>(s[x]) &lt; <span class="built_in">abs</span>(s[y]):</span><br><span class="line">        s[y] += s[x]    <span class="comment"># 一定要注意 集合规模扩张要写在前面！！！</span></span><br><span class="line">        s[x] = y        <span class="comment"># 小集合 融入 大集合</span></span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&#x27;1 !&#x27;</span>, s[x], s[y])</span><br><span class="line">    <span class="keyword">elif</span> <span class="built_in">abs</span>(s[x]) &gt; <span class="built_in">abs</span>(s[y]):</span><br><span class="line">        s[x] += s[y]</span><br><span class="line">        s[y] = x</span><br><span class="line">    <span class="keyword">elif</span> <span class="built_in">abs</span>(s[x]) == <span class="built_in">abs</span>(s[y]):</span><br><span class="line">        s[y] += s[x]</span><br><span class="line">        s[x] = y</span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">main</span>(<span class="params">L</span>):</span><br><span class="line">    S = L.pop(<span class="number">0</span>)[<span class="number">0</span>] * [-<span class="number">1</span>]  <span class="comment">#S 是集合。</span></span><br><span class="line">    <span class="keyword">for</span> o <span class="keyword">in</span> L:</span><br><span class="line">        <span class="built_in">print</span>(o,o[<span class="number">0</span>])</span><br><span class="line">        <span class="keyword">if</span> o[<span class="number">0</span>] == <span class="string">&#x27;i&#x27;</span>:</span><br><span class="line">            Input_connection(o[<span class="number">1</span>],o[<span class="number">2</span>],S)</span><br><span class="line">        <span class="keyword">if</span> o[<span class="number">0</span>] == <span class="string">&#x27;c&#x27;</span>:</span><br><span class="line">            Check_connection(o[<span class="number">1</span>],o[<span class="number">2</span>],S)</span><br><span class="line">        <span class="keyword">if</span> o[<span class="number">0</span>] == <span class="string">&#x27;s&#x27;</span>:</span><br><span class="line">            Check_network(S)</span><br><span class="line">    <span class="comment"># return S</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">Input_connection</span>(<span class="params">node1,node2,S</span>):</span><br><span class="line">    root1 = find(node1-<span class="number">1</span>,S)   <span class="comment"># node1 - 1 是为了做映射 。</span></span><br><span class="line">    root2 = find(node2-<span class="number">1</span>,S)</span><br><span class="line">    <span class="keyword">if</span> root1 != root2:  <span class="comment"># 如果是两个集合,就连接两个点。</span></span><br><span class="line">        union(root1,root2,S)</span><br><span class="line"><span class="keyword">def</span> <span class="title function_">Check_connection</span>(<span class="params">node1,node2,S</span>):</span><br><span class="line">    root1 = find(node1-<span class="number">1</span>,S)</span><br><span class="line">    root2 = find(node2-<span class="number">1</span>,S)</span><br><span class="line">    <span class="keyword">if</span> root1 == root2:</span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&#x27;yes&#x27;</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&#x27;no&#x27;</span>)</span><br><span class="line"><span class="keyword">def</span> <span class="title function_">Check_network</span>(<span class="params">S</span>):  <span class="comment"># 集合数量。</span></span><br><span class="line">    num = <span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(<span class="built_in">len</span>(S)):</span><br><span class="line">        <span class="keyword">if</span> S[i] &lt; <span class="number">0</span>:</span><br><span class="line">            num += <span class="number">1</span></span><br><span class="line">    <span class="keyword">if</span> num == <span class="number">1</span>:</span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&#x27;the network is connected&#x27;</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&#x27;there are %d components.&#x27;</span>%num)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">&#x27;__main__&#x27;</span>:</span><br><span class="line">    L = [[<span class="number">5</span>] ,</span><br><span class="line">        [<span class="string">&#x27;c&#x27;</span>, <span class="number">3</span>, <span class="number">2</span>] ,</span><br><span class="line">        [<span class="string">&#x27;i&#x27;</span>, <span class="number">3</span>, <span class="number">2</span>],</span><br><span class="line">        [<span class="string">&#x27;c&#x27;</span>, <span class="number">3</span>, <span class="number">2</span>] ,</span><br><span class="line">        [<span class="string">&#x27;i&#x27;</span>, <span class="number">4</span>, <span class="number">5</span>],</span><br><span class="line">        [<span class="string">&#x27;i&#x27;</span>, <span class="number">2</span>, <span class="number">4</span>],</span><br><span class="line">        [<span class="string">&#x27;c&#x27;</span>, <span class="number">3</span>, <span class="number">5</span>],</span><br><span class="line">        [<span class="string">&#x27;i&#x27;</span>, <span class="number">1</span>, <span class="number">3</span>],</span><br><span class="line">        [<span class="string">&#x27;c&#x27;</span>, <span class="number">1</span>, <span class="number">5</span>],</span><br><span class="line">        [<span class="string">&#x27;s&#x27;</span>] ]</span><br><span class="line"></span><br><span class="line">    main(L)</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
